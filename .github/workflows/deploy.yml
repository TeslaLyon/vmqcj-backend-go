name: Deploy Go App to Server

# 触发条件：当 main 分支有代码 push 时触发
on:
  push:
    branches:
      - main

# ⚠️ 关键修改：明确赋予工作流推送到 GHCR 镜像仓库的权限
permissions:
  contents: read    # 读取代码权限
  packages: write   # 写入（推送）镜像的权限

# 定义要执行的任务
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库中的源码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 登录到 GitHub 官方镜像仓库 (GHCR)
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动生成的临时 Token

    # 3. 提取镜像标签（仅将用户名部分转换为小写，保持变量名 IMAGE_NAME 大写）
    - name: Downcase repo name
      run: |
        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=ghcr.io/${OWNER_LOWER}/vmqcj:latest" >> $GITHUB_ENV

    # ---- 📢 在这里新增两步，用于支持跨平台构建 ----
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    # 4. 构建 Docker 镜像并推送到仓库
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ env.IMAGE_NAME }}

    # 5. 通过 SSH 远程连接服务器，拉取新镜像并重启容器
    - name: Copy docker-compose to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "docker-compose.yml" 
        target: "/home/cj/web_services/vmqcj-backend-go"
        script: |
          set -e  # 报错即停止
          
          # 1. 进入你在服务器上的部署目录
          cd /home/cj/web_services/vmqcj-backend-go
          
          # 2. 登录到 GitHub 镜像仓库
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          
          # 3. 设置环境变量，告知 Compose 使用哪一个最新的镜像
          export API_IMAGE=${{ env.IMAGE_NAME }}
          
          # 4. 拉取最新的镜像（包括 API 和 MariaDB）
          docker compose pull
          
          # 5. 启动（或更新）整套服务
          # --remove-orphans 会清理掉不再定义在 compose 文件中的旧容器
          docker compose up -d --remove-orphans
            
          # 6. 清理无用镜像，节省磁盘
          docker image prune -f