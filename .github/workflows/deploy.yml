name: Deploy Go App to Server

on:
  push:
    branches:
      - main

permissions:
  contents: read    
  packages: write   

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库中的源码
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache: true 

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. 登录到 GitHub 官方镜像仓库 (GHCR)
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} 

    # 3. 提取镜像标签
    - name: Downcase repo name
      run: |
        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=ghcr.io/${OWNER_LOWER}/vmqcj:latest" >> $GITHUB_ENV

    # 4. 开启跨平台编译环境支持
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. 构建真正的原生 ARM64 镜像并推送到仓库
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ env.IMAGE_NAME }}
        platforms: linux/arm64  # ⚠️ 明确指定打包成 ARM64 架构镜像
        # ⚠️ 关键新增：开启 GitHub Actions 缓存后端
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # 6. 把 docker-compose.yml 拷贝到服务器（仅负责拷贝）
    - name: Copy docker-compose to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "docker-compose.yml" 
        target: "/home/cj/web_services/vmqcj-backend-go"

    # 7. 💡 独立出来的步骤：通过 SSH 远程连接服务器执行自动化部署
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e  # 遇到任何错误立刻停止
          
          # 进入服务器部署目录
          cd /home/cj/web_services/vmqcj-backend-go
          
          # 登录到镜像仓库
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          
          # 设置环境变量供 docker-compose 消费
          export API_IMAGE=${{ env.IMAGE_NAME }}
          
          # 拉取最新镜像
          docker compose pull
          
          # 启动服务，并强行清理掉改名留下的旧孤儿容器（--remove-orphans）
          docker compose up -d --remove-orphans
            
          # 清理无用虚假镜像
          docker image prune -f